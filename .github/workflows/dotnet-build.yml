name: Build & Package

on:
  push:
    branches: [ "master" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build & Create CIPX
        run: dotnet publish -c Release -p:CreateCipx=true

      - name: Upload CIPX artifact
        uses: actions/upload-artifact@v4
        with:
          name: LECIA-cipx
          path: cipx/LECIA.cipx
          if-no-files-found: error

      - name: Upload build output artifact
        uses: actions/upload-artifact@v4
        with:
          name: LECIA-build
          path: bin/Release/net8.0/
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download CIPX
        uses: actions/download-artifact@v4
        with:
          name: LECIA-cipx
          path: release

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: LECIA-build
          path: release-full

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/LECIA.cipx
          body: |
            ## LECIA ${{ github.ref_name }}

            ClassIsland >= 2.0.0.0 专用插件。

            ### 安装方式
            1. 下载 `LECIA.cipx`
            2. 在 ClassIsland → 应用设置 → 插件 → 从本地安装
            3. 或手动解压 `LECIA.cipx` 到 ClassIsland 安装目录下的 `Plugins/LECIA/`
